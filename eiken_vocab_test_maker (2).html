<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英検単語テストメーカー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #f5f4f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
    color: #1a1a1a;
  }

  .app {
    width: 100%;
    max-width: 680px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: #1a1a1a;
    color: #f5f4f0;
    padding: 4px 10px;
    border-radius: 3px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.15;
    color: #1a1a1a;
  }

  .subtitle {
    margin-top: 8px;
    font-size: 14px;
    color: #666;
  }

  .card {
    background: white;
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 20px;
    border: 1px solid #e5e3df;
  }

  .card-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 16px;
  }

  .settings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin-bottom: 6px;
  }

  input[type="text"], input[type="number"], select, textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #e0dedd;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #fafaf8;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: #1a1a1a;
    background: white;
  }

  textarea {
    resize: vertical;
    min-height: 110px;
    line-height: 1.6;
  }

  .word-count {
    font-size: 12px;
    color: #999;
    text-align: right;
    margin-top: 6px;
  }

  .word-count.ok { color: #2d8a4e; font-weight: 600; }
  .word-count.warn { color: #c0392b; font-weight: 600; }

  .chat-area {
    border: 1.5px solid #e0dedd;
    border-radius: 8px;
    overflow: hidden;
    background: #fafaf8;
    min-height: 120px;
    max-height: 300px;
    overflow-y: auto;
    padding: 14px;
    margin-bottom: 12px;
    font-size: 14px;
    line-height: 1.7;
    color: #333;
    display: none;
  }

  .chat-area.visible { display: block; }

  .msg { margin-bottom: 10px; }
  .msg.ai { color: #1a1a1a; }
  .msg.ai::before { content: "AI → "; font-weight: 700; color: #888; font-size: 12px; }
  .msg.system { color: #888; font-size: 12px; font-style: italic; }

  .generate-btn {
    width: 100%;
    padding: 14px;
    background: #1a1a1a;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .generate-btn:hover { background: #333; }
  .generate-btn:active { transform: scale(0.98); }
  .generate-btn:disabled { background: #bbb; cursor: not-allowed; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .generate-btn.loading .spinner { display: block; }
  .generate-btn.loading .btn-text { opacity: 0.7; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .download-area {
    display: none;
    flex-direction: column;
    gap: 12px;
  }
  .download-area.visible { display: flex; }

  .preview-frame {
    width: 100%;
    height: 500px;
    border: 1.5px solid #e0dedd;
    border-radius: 8px;
    background: white;
  }

  .download-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px;
    background: #2d8a4e;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
  }
  .download-btn:hover { background: #236b3c; }

  .print-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px;
    background: transparent;
    color: #444;
    border: 1.5px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .print-btn:hover { border-color: #999; color: #111; }

  .error-msg {
    display: none;
    background: #fdf0f0;
    border: 1px solid #f5c6c6;
    border-radius: 8px;
    padding: 12px 16px;
    color: #c0392b;
    font-size: 13px;
    margin-top: 12px;
  }
  .error-msg.visible { display: block; }

  .howto {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin-top: 24px;
    line-height: 1.8;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="badge">自動生成ツール</div>
    <h1>英検単語テストメーカー</h1>
    <p class="subtitle">単語40個を貼り付けるだけでA4テスト用紙PDFを生成</p>
  </header>

  <div class="card">
    <div class="card-title">テスト設定</div>
    <div class="settings-grid">
      <div>
        <label for="testTitle">テストタイトル</label>
        <input type="text" id="testTitle" value="英検3級　単語テスト①" placeholder="例：英検3級　単語テスト①">
      </div>
      <div>
        <label for="grade">級</label>
        <select id="grade">
          <option value="5級">5級</option>
          <option value="4級">4級</option>
          <option value="3級" selected>3級</option>
          <option value="準2級">準2級</option>
          <option value="2級">2級</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">単語リスト（40個）</div>
    <textarea id="wordInput" placeholder="単語をカンマ・スペース・改行で区切って40個入力&#10;例：look, take, make, see, watch, give, work, call, enjoy, find..."></textarea>
    <div class="word-count" id="wordCount">0 / 40 単語</div>
  </div>

  <div class="card">
    <div class="card-title">生成ログ</div>
    <div class="chat-area" id="chatArea"></div>
    <button class="generate-btn" id="generateBtn" onclick="generateTest()">
      <div class="spinner"></div>
      <span class="btn-text">📄 テスト用紙を生成する</span>
    </button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="card download-area" id="downloadArea">
    <div class="card-title">プレビュー & ダウンロード</div>
    <iframe class="preview-frame" id="previewFrame"></iframe>
    <button class="print-btn" onclick="printPDF()">🖨️ 印刷する（PDF保存も可）</button>
  </div>

  <div class="howto">
    印刷ダイアログで「PDFに保存」を選ぶとPDFファイルとして保存できます<br>
    Ctrl+P（Mac: ⌘P）でも印刷できます
  </div>
</div>

<script>
const wordInput = document.getElementById('wordInput');
const wordCount = document.getElementById('wordCount');
const chatArea = document.getElementById('chatArea');
const generateBtn = document.getElementById('generateBtn');
const downloadArea = document.getElementById('downloadArea');
const errorMsg = document.getElementById('errorMsg');
const previewFrame = document.getElementById('previewFrame');

wordInput.addEventListener('input', updateCount);

function updateCount() {
  const words = parseWords(wordInput.value);
  const n = words.length;
  wordCount.textContent = `${n} / 40 単語`;
  wordCount.className = 'word-count' + (n === 40 ? ' ok' : n > 40 ? ' warn' : '');
}

function parseWords(text) {
  return text.split(/[\s,、，\n]+/).map(w => w.trim()).filter(w => w.length > 0);
}

function addLog(msg, type='system') {
  chatArea.classList.add('visible');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.textContent = msg;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function generateHTML(title, words) {
  const left = words.slice(0, 20);
  const right = words.slice(20, 40);

  const buildRows = (list, startNum) => list.map((w, i) => `
    <div class="word-row">
      <span class="num">${startNum + i}.</span>
      <span class="word">${w}</span>
      <span class="underline"></span>
    </div>`).join('');

  return `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @page { size: A4; margin: 18mm 14mm 14mm 14mm; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-size: 14pt; color: #000; background: white; }
  .title { font-size: 18pt; font-weight: bold; text-align: center; margin-bottom: 8px; }
  .divider { border: none; border-top: 1.5px solid #000; margin-bottom: 0; }
  .columns { display: flex; margin-top: 14pt; }
  .col { flex: 1; display: flex; flex-direction: column; }
  .col-left { padding-right: 16px; border-right: 1.5px solid #000; }
  .col-right { padding-left: 16px; }
  .word-row { display: flex; align-items: baseline; line-height: 2; font-size: 14pt; }
  .num { min-width: 26pt; text-align: right; padding-right: 4pt; flex-shrink: 0; }
  .word { min-width: 72pt; flex-shrink: 0; }
  .underline { flex: 1; border-bottom: 1px solid #000; margin-bottom: 3pt; min-width: 80pt; }
</style>
</head>
<body>
<div class="title">${title}</div>
<hr class="divider">
<div class="columns">
  <div class="col col-left">${buildRows(left, 1)}</div>
  <div class="col col-right">${buildRows(right, 21)}</div>
</div>
</body>
</html>`;
}

async function generateTest() {
  errorMsg.classList.remove('visible');
  const words = parseWords(wordInput.value);
  const title = document.getElementById('testTitle').value.trim() || '英検単語テスト';

  if (words.length < 40) {
    showError(`単語が${words.length}個しかありません。40個入力してください。`);
    return;
  }
  if (words.length > 40) {
    showError(`単語が${words.length}個あります。ちょうど40個にしてください。`);
    return;
  }

  generateBtn.classList.add('loading');
  generateBtn.disabled = true;
  downloadArea.classList.remove('visible');
  chatArea.innerHTML = '';

  addLog('単語リストを確認しています…');

  try {
    const prompt = `以下の40個の英単語リストを確認して、問題があればJSON形式で教えてください。
単語: ${words.join(', ')}
タイトル: ${title}

返答はJSON形式のみで:
{"valid": true/false, "message": "問題があれば理由", "words": [確認済み40個の単語配列]}
日本語で返答し、JSON以外のテキストは含めないでください。`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');

    let parsed;
    try {
      const clean = text.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch(e) {
      parsed = { valid: true, words: words, message: '' };
    }

    if (!parsed.valid && parsed.message) {
      addLog(parsed.message, 'ai');
    } else {
      addLog('単語リストを確認しました ✓', 'system');
    }

    addLog('テスト用紙のHTMLを生成中…', 'system');
    const finalWords = (parsed.words && parsed.words.length === 40) ? parsed.words : words;
    const html = generateHTML(title, finalWords);

    addLog('プレビューを作成しています…', 'system');

    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    previewFrame.src = url;

    window._currentHTML = html;
    window._currentTitle = title;

    downloadArea.classList.add('visible');
    addLog('完成しました！下でプレビューを確認し、印刷またはPDF保存できます ✓', 'ai');

  } catch(err) {
    showError('生成中にエラーが発生しました: ' + err.message);
  } finally {
    generateBtn.classList.remove('loading');
    generateBtn.disabled = false;
  }
}

function printPDF() {
  const win = previewFrame.contentWindow;
  if (win) {
    win.focus();
    win.print();
  }
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.add('visible');
}

// プリセット単語を入れておく
wordInput.value = 'look, take, make, see, watch, give, work, call, enjoy, find, practice, tell, leave, need, say, finish, sell, clean, wait, become, show, join, bring, move, put, drive, rain, win, speak, travel, hope, ride, sound, wear, train, hour, weekend, restaurant, food, month';
updateCount();
</script>
</body>
</html>
