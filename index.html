<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英語テストメーカー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #f5f4f0;
    min-height: 100vh;
    color: #1a1a1a;
    padding-bottom: 48px;
  }

  /* ===== ヘッダー ===== */
  .site-header {
    background: #1a1a1a;
    color: white;
    text-align: center;
    padding: 28px 16px;
  }
  .site-header h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  .site-header p {
    font-size: 13px;
    color: #aaa;
    margin-top: 4px;
  }

  /* ===== APIキーバー ===== */
  .api-bar {
    background: #111;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .api-bar label {
    font-size: 12px;
    color: #aaa;
    font-weight: 600;
    white-space: nowrap;
    margin-bottom: 0;
  }
  .api-bar input {
    flex: 1;
    max-width: 340px;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1.5px solid #444;
    background: #222;
    color: white;
    font-size: 12px;
    font-family: monospace;
    outline: none;
  }
  .api-bar input:focus { border-color: #888; }
  .api-save-btn {
    padding: 6px 14px;
    background: #2d8a4e;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }
  .api-save-btn:hover { background: #236b3c; }
  .api-badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 700;
    white-space: nowrap;
  }
  .api-badge.ok   { background: #1a3d2a; color: #4ade80; }
  .api-badge.warn { background: #3d1a1a; color: #f87171; }

  /* ===== 種別・級セレクター ===== */
  .type-selector, .grade-selector {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .type-btn, .grade-btn {
    flex: 1;
    min-width: 64px;
    padding: 10px 8px;
    border: 1.5px solid #e0dedd;
    background: #fafaf8;
    color: #555;
    font-size: 13px;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .type-btn:hover, .grade-btn:hover { border-color: #999; color: #111; }
  .type-btn.active, .grade-btn.active {
    background: #1a1a1a;
    color: white;
    border-color: #1a1a1a;
  }

  /* ===== コンテンツ共通 ===== */
  .page {
    width: 100%;
    max-width: 700px;
    margin: 0 auto;
    padding: 32px 16px 0;
  }

  .card {
    background: white;
    border-radius: 12px;
    padding: 24px 28px;
    margin-bottom: 16px;
    border: 1px solid #e5e3df;
  }
  .card-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 14px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #555;
    margin-bottom: 5px;
  }
  input[type="text"], input[type="number"], select, textarea {
    width: 100%;
    padding: 9px 11px;
    border: 1.5px solid #e0dedd;
    border-radius: 7px;
    font-size: 14px;
    font-family: inherit;
    background: #fafaf8;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: #1a1a1a;
    background: white;
  }

  /* ===== ログ・ボタン ===== */
  .chat-area {
    border: 1.5px solid #e0dedd;
    border-radius: 8px;
    background: #fafaf8;
    max-height: 220px;
    overflow-y: auto;
    padding: 12px 14px;
    margin-bottom: 12px;
    font-size: 13px;
    line-height: 1.75;
    color: #333;
    display: none;
  }
  .chat-area.visible { display: block; }
  .msg { margin-bottom: 6px; }
  .msg.system { color: #999; font-size: 12px; font-style: italic; }
  .msg.ai { color: #1a1a1a; }
  .msg.ai::before { content: "AI → "; font-weight: 700; color: #aaa; font-size: 11px; }

  .generate-btn {
    width: 100%;
    padding: 13px;
    background: #1a1a1a;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s, transform 0.1s;
  }
  .generate-btn:hover { background: #333; }
  .generate-btn:active { transform: scale(0.98); }
  .generate-btn:disabled { background: #bbb; cursor: not-allowed; }

  .spinner {
    width: 15px; height: 15px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .generate-btn.loading .spinner { display: block; }
  .generate-btn.loading .btn-text { opacity: 0.7; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    display: none;
    background: #fdf0f0;
    border: 1px solid #f5c6c6;
    border-radius: 7px;
    padding: 10px 14px;
    color: #c0392b;
    font-size: 13px;
    margin-top: 10px;
  }
  .error-msg.visible { display: block; }

  /* ===== プレビュー・印刷 ===== */
  .download-area { display: none; flex-direction: column; gap: 10px; }
  .download-area.visible { display: flex; }

  .preview-frame {
    width: 100%;
    height: 560px;
    border: 1.5px solid #e0dedd;
    border-radius: 8px;
    background: white;
  }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .print-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px;
    background: #2d8a4e;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .print-btn:hover { background: #236b3c; }

  .save-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px;
    background: #1a6fd4;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .save-btn:hover { background: #1558ab; }

  .reset-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px;
    background: transparent;
    color: #666;
    border: 1.5px solid #ccc;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: #999; color: #111; }

  .howto {
    text-align: center;
    font-size: 11px;
    color: #bbb;
    margin-top: 20px;
    line-height: 1.9;
  }
</style>
</head>
<body>

<!-- ===== サイトヘッダー ===== -->
<div class="site-header">
  <h1>英語テストメーカー</h1>
  <p>英検対応 / タイプと級を選ぶとAIがテストを自動生成</p>
</div>
<div class="api-bar">
  <label for="api-key-input">🔑 APIキー</label>
  <input type="password" id="api-key-input" placeholder="sk-ant-xxxxxxxxxxxx">
  <button class="api-save-btn" onclick="saveApiKey()">保存</button>
  <span class="api-badge warn" id="api-badge">未設定</span>
</div>

<div class="page">

  <div class="card">
    <div class="card-title">テストタイトル</div>
    <input type="text" id="q-title" placeholder="タイトルを入力（自動提案されます）">
  </div>

  <div class="card">
    <div class="card-title">テスト種別</div>
    <div class="type-selector" id="type-selector">
      <button type="button" class="type-btn" data-type="wayaku">和訳</button>
      <button type="button" class="type-btn" data-type="eiyaku">英訳</button>
      <button type="button" class="type-btn active" data-type="vocab">単語</button>
      <button type="button" class="type-btn" data-type="jukugo">熟語</button>
    </div>

    <div class="card-title" style="margin-top:18px;">級</div>
    <div class="grade-selector" id="grade-selector">
      <button type="button" class="grade-btn active" data-grade="3級">3級</button>
      <button type="button" class="grade-btn" data-grade="準2級">準2級</button>
      <button type="button" class="grade-btn" data-grade="2級">2級</button>
      <button type="button" class="grade-btn" data-grade="準1級">準1級</button>
      <button type="button" class="grade-btn" data-grade="1級">1級</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">生成ログ</div>
    <div class="chat-area" id="q-log"></div>
    <button class="generate-btn" id="q-btn" onclick="generate()">
      <div class="spinner"></div>
      <span class="btn-text">📄 テスト用紙を生成する</span>
    </button>
    <div class="error-msg" id="q-err"></div>
  </div>

  <div class="card download-area" id="q-download">
    <div class="card-title">プレビュー & 印刷</div>
    <iframe class="preview-frame" id="q-frame"></iframe>
    <div class="btn-row">
      <button class="print-btn" onclick="framePrint('q')">🖨️ 印刷する</button>
      <button class="save-btn" onclick="frameSavePDF('q')">💾 PDFに保存</button>
    </div>
    <button class="reset-btn" onclick="resetSection('q')">↩ やり直す</button>
  </div>

  <div class="howto">
    印刷ダイアログで「PDFに保存」を選ぶとPDFとして保存できます<br>
    Ctrl+P でも印刷できます
  </div>
</div>

<script>
// ===== 共通ユーティリティ =====

const API_KEY_STORAGE = 'english_test_maker_api_key';

function getApiKey() {
  return localStorage.getItem(API_KEY_STORAGE) || null;
}

function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key.startsWith('sk-ant-')) {
    alert('APIキーは sk-ant- で始まる必要があります。');
    return;
  }
  localStorage.setItem(API_KEY_STORAGE, key);
  updateApiBadge(true);
}

function updateApiBadge(saved) {
  const badge = document.getElementById('api-badge');
  if (saved) {
    badge.textContent = '✓ 設定済み';
    badge.className = 'api-badge ok';
  } else {
    badge.textContent = '未設定';
    badge.className = 'api-badge warn';
  }
}

// ページ読み込み時にAPIキーをlocalStorageから復元
(function() {
  const saved = localStorage.getItem(API_KEY_STORAGE);
  if (saved) {
    document.getElementById('api-key-input').value = saved;
    updateApiBadge(true);
  }
})();

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}

function addLog(logId, msg, type = 'system') {
  const area = document.getElementById(logId);
  area.classList.add('visible');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.textContent = msg;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showError(errId, msg) {
  const el = document.getElementById(errId);
  el.textContent = msg;
  el.classList.add('visible');
}

function setLoading(btnId, on) {
  const btn = document.getElementById(btnId);
  btn.classList.toggle('loading', on);
  btn.disabled = on;
}

function openInNewTab(html) {
  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
  w.focus();
  return w;
}

function framePrint(key) {
  const html = window._html[key];
  if (!html) return;
  const w = openInNewTab(html);
  setTimeout(() => w.print(), 400);
}

function frameSavePDF(key) {
  const html = window._html[key];
  if (!html) return;
  const hint = `
    <div class="__pdf-hint" style="position:fixed;top:0;left:0;right:0;background:#1a6fd4;color:white;padding:14px 20px;font-family:Arial,sans-serif;font-size:15px;text-align:center;z-index:9999;font-weight:bold;letter-spacing:0.01em;">
      💾 PDFに保存するには → 印刷ダイアログで「<u>PDFに保存</u>」を選択してください
    </div>
    <style>@media print { .__pdf-hint { display:none !important; } }</style>`;
  const htmlWithHint = html.replace('</body>', hint + '</body>');
  const w = openInNewTab(htmlWithHint);
  setTimeout(() => w.print(), 400);
}

function resetSection(prefix) {
  document.getElementById(prefix + '-download').classList.remove('visible');
  const log = document.getElementById(prefix + '-log');
  log.innerHTML = '';
  log.classList.remove('visible');
  document.getElementById(prefix + '-err').classList.remove('visible');
}

async function callClaude(prompt, maxTokens = 2000) {
  const key = getApiKey();
  if (!key) throw new Error('APIキーを設定してください。');

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: maxTokens,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content.map(i => i.text || '').join('');
}

function parseJSON(text) {
  return JSON.parse(text.replace(/```json|```/g, '').trim());
}

window._html = { q: null };

// ===== テスト種別・級セレクター =====

const TYPE_LABELS = { wayaku: '和訳', eiyaku: '英訳', vocab: '単語', jukugo: '熟語' };
const state = { type: 'vocab', grade: '3級', titleTouched: false };

function suggestedTitle() {
  return `英検${state.grade}　${TYPE_LABELS[state.type]}テスト`;
}

function maybeUpdateTitle() {
  const input = document.getElementById('q-title');
  if (state.titleTouched && input.value.trim() !== '') return;
  input.value = suggestedTitle();
}

function initSelectors() {
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.type = btn.dataset.type;
      maybeUpdateTitle();
    });
  });
  document.querySelectorAll('.grade-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.grade = btn.dataset.grade;
      maybeUpdateTitle();
    });
  });
  document.getElementById('q-title').addEventListener('input', () => {
    state.titleTouched = true;
  });
  maybeUpdateTitle();
}

initSelectors();

// ===== 単語・熟語テスト（2列・空欄埋め形式）=====

function buildVocabHTML(title, words, opts = {}) {
  const fontSize = opts.fontSize || 14;
  const cellMinWidth = opts.cellMinWidth || 72;
  const lineMinWidth = opts.lineMinWidth || 80;
  const left = words.slice(0, 20);
  const right = words.slice(20, 40);
  const rows = (list, start) => list.map((w, i) => `
    <div class="word-row">
      <span class="num">${start + i}.</span>
      <span class="word">${escapeHtml(w)}</span>
      <span class="line"></span>
    </div>`).join('');

  return `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<style>
  @page{size:A4;margin:18mm 14mm 14mm 14mm;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Arial,sans-serif;font-size:${fontSize}pt;color:#000;background:white;}
  .title{font-size:18pt;font-weight:bold;text-align:center;margin-bottom:8px;}
  .divider{border:none;border-top:1.5px solid #000;margin-bottom:0;}
  .columns{display:flex;margin-top:14pt;}
  .col{flex:1;display:flex;flex-direction:column;}
  .col-left{padding-right:16px;border-right:1.5px solid #000;}
  .col-right{padding-left:16px;}
  .word-row{display:flex;align-items:baseline;line-height:2;font-size:${fontSize}pt;}
  .num{min-width:26pt;text-align:right;padding-right:4pt;flex-shrink:0;}
  .word{min-width:${cellMinWidth}pt;flex-shrink:0;}
  .line{flex:1;border-bottom:1px solid #000;margin-bottom:3pt;min-width:${lineMinWidth}pt;}
</style></head><body>
<div class="title">${escapeHtml(title)}</div>
<hr class="divider">
<div class="columns">
  <div class="col col-left">${rows(left, 1)}</div>
  <div class="col col-right">${rows(right, 21)}</div>
</div>
</body></html>`;
}

// ===== 和訳テスト =====

function buildWayakuHTML(title, sentences) {
  const rows = sentences.map((s, i) => `
<div class="q-block">
  <div class="q-line"><span class="num">${i+1}.</span><span class="sentence">${escapeHtml(s)}</span></div>
  <div class="ans-line"><span class="ans-underline"></span></div>
</div>`).join('');

  return `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<style>
  @page{size:A4;margin:18mm 14mm 14mm 14mm;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Arial,sans-serif;font-size:14pt;color:#000;background:white;}
  .title{font-size:18pt;font-weight:bold;text-align:center;margin-bottom:9px;}
  .divider{border:none;border-top:1.5px solid #000;}
  .spacer{height:12pt;}
  .q-block{margin-bottom:4pt;}
  .q-line{display:flex;align-items:baseline;line-height:2;font-size:14pt;}
  .num{min-width:28pt;flex-shrink:0;}
  .sentence{flex-shrink:0;}
  .ans-line{display:flex;padding-left:28pt;line-height:1.8;}
  .ans-underline{flex:1;border-bottom:1px solid #000;margin-bottom:4pt;}
</style></head><body>
<div class="title">${escapeHtml(title)}</div>
<hr class="divider">
<div class="spacer"></div>
${rows}
</body></html>`;
}

// ===== 英訳テスト =====

function buildEiyakuHTML(title, items) {
  const rows = items.map((item, i) =>
    `<div class="qb">` +
    `<div class="ql"><span class="num">${i+1}.</span>` +
    `<span class="kw">${escapeHtml(item.word)}</span>` +
    `<span class="jp">${escapeHtml(item.jp)}</span></div>` +
    `<div class="al"><span class="uline"></span></div>` +
    `</div>`
  ).join('');

  return `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<style>
  @page{size:A4;margin:18mm 14mm 14mm 14mm;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Arial,sans-serif;font-size:14pt;color:#000;background:white;}
  .title{font-size:18pt;font-weight:bold;text-align:center;margin-bottom:9px;}
  .divider{border:none;border-top:1.5px solid #000;}
  .spacer{height:12pt;}
  .ql{display:flex;align-items:baseline;font-size:14pt;line-height:2;}
  .num{min-width:22pt;flex-shrink:0;}
  .kw{flex-shrink:0;font-weight:bold;padding-right:8pt;min-width:77pt;}
  .jp{flex-shrink:0;}
  .al{display:flex;align-items:flex-end;}
  .uline{flex:1;border-bottom:1px solid #000;margin-bottom:3pt;margin-left:22pt;}
</style></head><body>
<div class="title">${escapeHtml(title)}</div>
<hr class="divider">
<div class="spacer"></div>
${rows}
</body></html>`;
}

// ===== AIプロンプト =====

function buildVocabPrompt(grade) {
  return `あなたは英語教師です。英検${grade}レベルの単語テストを作成してください。
英検${grade}の受験者が覚えるべき、頻出度が高く教育的に適切な英単語を40個選んでください。
条件:
- 重複しないこと
- 英検${grade}レベルの難易度に合っていること（易しすぎず難しすぎない）
- 中学・高校の教科書や英検の過去問でよく使われる実用的な単語を優先すること
返答はJSON形式のみで、他のテキストは含めないでください:
{"words": ["word1", "word2", ..., "word40"]}
必ず40個ちょうど返してください。`;
}

function buildJukugoPrompt(grade) {
  return `あなたは英語教師です。英検${grade}レベルの熟語（イディオム・句動詞）テストを作成してください。
英検${grade}の受験者が覚えるべき、頻出度が高く教育的に適切な英熟語・慣用表現を40個選んでください（例: "give up on", "in front of", "look forward to" のような2〜4語の連語表現）。
条件:
- 重複しないこと
- 英検${grade}レベルの難易度に合っていること
- 中学・高校の教科書や英検の過去問でよく使われる実用的な熟語を優先すること
- 単語一つだけのものは含めず、必ず複数語からなる連語表現にすること
返答はJSON形式のみで、他のテキストは含めないでください:
{"phrases": ["phrase1", "phrase2", ..., "phrase40"]}
必ず40個ちょうど返してください。`;
}

function buildWayakuPrompt(grade) {
  return `あなたは英語教師です。英検${grade}レベルの短文和訳テストを作成してください。
まず英検${grade}レベルに適した語彙を自分で選び、それらの語彙を使って英文を20個作成してください。
条件:
- 各英文は6〜8語程度（短めで読みやすく）
- 英検${grade}レベルに適した英文（語彙・構文の難易度）
- 日常的でわかりやすい内容にすること
- 20文それぞれが異なる内容・構文になるようにすること
返答はJSON形式のみで、他のテキストは含めないでください:
{"sentences": ["英文1", "英文2", ..., "英文20"]}
必ず20個ちょうど返してください。`;
}

function buildEiyakuPrompt(grade) {
  return `あなたは英語教師です。英検${grade}レベルの英訳テストを作成してください。
まず英検${grade}レベルに適した英単語を20個自分で選び、各単語について、その単語を使って英訳できる自然な日本語文を作成してください。
条件:
- 各日本語文はその英単語を使って英訳できる内容にすること
- 英訳すると7〜10語程度になる文にすること
- 英検${grade}レベルに適した語彙・内容にすること
- 日常的でわかりやすい文にすること
- 20語それぞれ異なる単語を選ぶこと（重複しない）
返答はJSON形式のみで、他のテキストは含めないでください:
{"items": [{"word": "英単語1", "jp": "日本語文1"}, ..., {"word": "英単語20", "jp": "日本語文20"}]}
必ず20個ちょうど返してください。`;
}

// ===== 生成 =====

async function generate() {
  document.getElementById('q-err').classList.remove('visible');
  document.getElementById('q-log').innerHTML = '';
  document.getElementById('q-download').classList.remove('visible');

  const title = document.getElementById('q-title').value.trim() || suggestedTitle();
  const grade = state.grade;
  const type = state.type;

  setLoading('q-btn', true);
  addLog('q-log', 'AIが内容を生成しています…');

  try {
    let html;

    if (type === 'vocab') {
      const text = await callClaude(buildVocabPrompt(grade), 1500);
      const parsed = parseJSON(text);
      if (!parsed.words || parsed.words.length !== 40) throw new Error('単語の生成に失敗しました（40個取得できませんでした）。');
      addLog('q-log', `${parsed.words.length}個の単語を生成しました ✓`);
      html = buildVocabHTML(title, parsed.words);

    } else if (type === 'jukugo') {
      const text = await callClaude(buildJukugoPrompt(grade), 2000);
      const parsed = parseJSON(text);
      if (!parsed.phrases || parsed.phrases.length !== 40) throw new Error('熟語の生成に失敗しました（40個取得できませんでした）。');
      addLog('q-log', `${parsed.phrases.length}個の熟語を生成しました ✓`);
      html = buildVocabHTML(title, parsed.phrases, { fontSize: 12, cellMinWidth: 150, lineMinWidth: 50 });

    } else if (type === 'wayaku') {
      const text = await callClaude(buildWayakuPrompt(grade), 2500);
      const parsed = parseJSON(text);
      if (!parsed.sentences || parsed.sentences.length !== 20) throw new Error('英文の生成に失敗しました（20問取得できませんでした）。');
      addLog('q-log', `${parsed.sentences.length}問の英文を生成しました ✓`);
      parsed.sentences.forEach((s, i) => addLog('q-log', `${i+1}. ${s}`, 'ai'));
      html = buildWayakuHTML(title, parsed.sentences);

    } else if (type === 'eiyaku') {
      const text = await callClaude(buildEiyakuPrompt(grade), 2500);
      const parsed = parseJSON(text);
      if (!parsed.items || parsed.items.length !== 20) throw new Error('日本語文の生成に失敗しました（20問取得できませんでした）。');
      addLog('q-log', `${parsed.items.length}問の日本語文を生成しました ✓`);
      parsed.items.forEach((item, i) => addLog('q-log', `${i+1}. ${item.word}　${item.jp}`, 'ai'));
      html = buildEiyakuHTML(title, parsed.items);
    }

    window._html.q = html;
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    document.getElementById('q-frame').src = URL.createObjectURL(blob);
    document.getElementById('q-download').classList.add('visible');
    addLog('q-log', '完成！プレビューを確認して印刷またはPDF保存してください ✓', 'ai');
  } catch (err) {
    showError('q-err', 'エラー: ' + err.message);
  } finally {
    setLoading('q-btn', false);
  }
}
</script>
