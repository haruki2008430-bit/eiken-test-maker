<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英検短文和訳テストメーカー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #f5f4f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
    color: #1a1a1a;
  }

  .app { width: 100%; max-width: 700px; }

  header { text-align: center; margin-bottom: 32px; }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: #1a1a1a;
    color: #f5f4f0;
    padding: 4px 10px;
    border-radius: 3px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #1a1a1a;
  }

  .subtitle { margin-top: 8px; font-size: 14px; color: #666; }

  .card {
    background: white;
    border-radius: 12px;
    padding: 24px 28px;
    margin-bottom: 18px;
    border: 1px solid #e5e3df;
  }

  .card-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 14px;
  }

  .settings-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 12px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #555;
    margin-bottom: 5px;
  }

  input[type="text"], select, textarea {
    width: 100%;
    padding: 9px 11px;
    border: 1.5px solid #e0dedd;
    border-radius: 7px;
    font-size: 13px;
    font-family: inherit;
    background: #fafaf8;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: #1a1a1a;
    background: white;
  }

  textarea {
    resize: vertical;
    min-height: 100px;
    line-height: 1.6;
  }

  .word-count {
    font-size: 12px;
    color: #aaa;
    text-align: right;
    margin-top: 5px;
  }
  .word-count.ok  { color: #2d8a4e; font-weight: 700; }
  .word-count.warn { color: #c0392b; font-weight: 700; }

  .info-box {
    background: #f0f7ff;
    border: 1px solid #c8dff7;
    border-radius: 7px;
    padding: 10px 14px;
    font-size: 12px;
    color: #2c5f9e;
    margin-top: 10px;
    line-height: 1.6;
  }

  .chat-area {
    border: 1.5px solid #e0dedd;
    border-radius: 8px;
    background: #fafaf8;
    min-height: 100px;
    max-height: 260px;
    overflow-y: auto;
    padding: 14px;
    margin-bottom: 12px;
    font-size: 13px;
    line-height: 1.75;
    color: #333;
    display: none;
  }
  .chat-area.visible { display: block; }

  .msg { margin-bottom: 8px; }
  .msg.system { color: #999; font-size: 12px; font-style: italic; }
  .msg.ai { color: #1a1a1a; }
  .msg.ai::before { content: "AI → "; font-weight: 700; color: #aaa; font-size: 11px; }
  .msg.err { color: #c0392b; }

  .generate-btn {
    width: 100%;
    padding: 13px;
    background: #1a1a1a;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s, transform 0.1s;
  }
  .generate-btn:hover { background: #333; }
  .generate-btn:active { transform: scale(0.98); }
  .generate-btn:disabled { background: #bbb; cursor: not-allowed; }

  .spinner {
    width: 15px; height: 15px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .generate-btn.loading .spinner { display: block; }
  .generate-btn.loading .btn-text { opacity: 0.7; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    display: none;
    background: #fdf0f0;
    border: 1px solid #f5c6c6;
    border-radius: 7px;
    padding: 10px 14px;
    color: #c0392b;
    font-size: 13px;
    margin-top: 10px;
  }
  .error-msg.visible { display: block; }

  .download-area {
    display: none;
    flex-direction: column;
    gap: 12px;
  }
  .download-area.visible { display: flex; }

  .preview-frame {
    width: 100%;
    height: 520px;
    border: 1.5px solid #e0dedd;
    border-radius: 8px;
    background: white;
  }

  .print-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px;
    background: #2d8a4e;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .print-btn:hover { background: #236b3c; }

  .reset-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px;
    background: transparent;
    color: #666;
    border: 1.5px solid #ccc;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: #999; color: #111; }

  .howto {
    text-align: center;
    font-size: 11px;
    color: #bbb;
    margin-top: 20px;
    line-height: 1.9;
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="badge">自動生成ツール</div>
    <h1>英検 短文和訳テストメーカー</h1>
    <p class="subtitle">単語を入れるだけでA4テスト用紙を自動生成</p>
  </header>

  <div class="card">
    <div class="card-title">テスト設定</div>
    <div class="settings-grid">
      <div>
        <label for="testTitle">テストタイトル</label>
        <input type="text" id="testTitle" value="英検3級　短文和訳テスト①">
      </div>
      <div>
        <label for="grade">級</label>
        <select id="grade">
          <option value="5級">5級</option>
          <option value="4級">4級</option>
          <option value="3級" selected>3級</option>
          <option value="準2級">準2級</option>
          <option value="2級">2級</option>
        </select>
      </div>
      <div>
        <label for="numWords">問題数</label>
        <select id="numWords">
          <option value="10">10問</option>
          <option value="15">15問</option>
          <option value="20" selected>20問（推奨）</option>
          <option value="24">24問（最大）</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">単語リスト</div>
    <textarea id="wordInput" placeholder="単語をカンマ・スペース・改行で区切って入力&#10;例：look, take, make, see, watch, give, work, call..."></textarea>
    <div class="word-count" id="wordCount">0 単語</div>
    <div class="info-box">
      AIが各単語を使った7〜12語の英文を自動で生成します。<br>
      問題数と単語数が合わない場合は自動で調整されます。
    </div>
  </div>

  <div class="card">
    <div class="card-title">生成ログ</div>
    <div class="chat-area" id="chatArea"></div>
    <button class="generate-btn" id="generateBtn" onclick="generateTest()">
      <div class="spinner"></div>
      <span class="btn-text">📄 テスト用紙を生成する</span>
    </button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="card download-area" id="downloadArea">
    <div class="card-title">プレビュー & 印刷</div>
    <iframe class="preview-frame" id="previewFrame"></iframe>
    <button class="print-btn" onclick="printTest()">🖨️ 印刷する（PDF保存も可）</button>
    <button class="reset-btn" onclick="resetAll()">↩ 最初からやり直す</button>
  </div>

  <div class="howto">
    印刷ダイアログで「PDFに保存」を選ぶとPDFとして保存できます<br>
    Ctrl+P（Mac: ⌘P）でも印刷できます
  </div>
</div>

<script>
const wordInput  = document.getElementById('wordInput');
const wordCount  = document.getElementById('wordCount');
const chatArea   = document.getElementById('chatArea');
const generateBtn = document.getElementById('generateBtn');
const downloadArea = document.getElementById('downloadArea');
const errorMsg   = document.getElementById('errorMsg');
const previewFrame = document.getElementById('previewFrame');

wordInput.value = 'look, take, make, see, watch, give, work, call, enjoy, find, practice, tell, leave, need, say, finish, sell, clean, wait, become';
updateCount();
wordInput.addEventListener('input', updateCount);

function updateCount() {
  const words = parseWords(wordInput.value);
  const n = words.length;
  const target = parseInt(document.getElementById('numWords').value);
  wordCount.textContent = `${n} 単語入力中`;
  wordCount.className = 'word-count' + (n >= target ? ' ok' : n > 0 ? '' : '');
}

document.getElementById('numWords').addEventListener('change', updateCount);

function parseWords(text) {
  return text.split(/[\s,、，\n]+/).map(w => w.trim()).filter(w => w.length > 0);
}

function addLog(msg, type = 'system') {
  chatArea.classList.add('visible');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.textContent = msg;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function buildHTML(title, sentences) {
  const rows = sentences.map((s, i) => `
<div class="row"><span class="num">${i+1}.</span><span class="sentence">${s}</span><span class="answer-line"></span></div>`).join('');

  return `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @page { size: A4; margin: 18mm 14mm 14mm 14mm; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-size: 14pt; color: #000; background: white; }
  .title { font-size: 18pt; font-weight: bold; text-align: center; margin-bottom: 9px; }
  .divider { border: none; border-top: 1.5px solid #000; }
  .spacer { height: 16pt; }
  .row { display: flex; align-items: flex-end; line-height: 2; font-size: 14pt; }
  .num { min-width: 28pt; flex-shrink: 0; padding-bottom: 3pt; }
  .sentence { flex-shrink: 0; padding-right: 10pt; padding-bottom: 3pt; }
  .answer-line { flex: 1; border-bottom: 1px solid #000; margin-bottom: 4pt; min-width: 30pt; }
</style>
</head>
<body>
<div class="title">${title}</div>
<hr class="divider">
<div class="spacer"></div>
${rows}
</body>
</html>`;
}

async function generateTest() {
  errorMsg.classList.remove('visible');
  chatArea.innerHTML = '';
  downloadArea.classList.remove('visible');

  const words = parseWords(wordInput.value);
  const title = document.getElementById('testTitle').value.trim() || '英検短文和訳テスト';
  const numQ  = parseInt(document.getElementById('numWords').value);
  const grade = document.getElementById('grade').value;

  if (words.length === 0) {
    showError('単語を入力してください。');
    return;
  }

  const useWords = words.slice(0, numQ);
  if (useWords.length < numQ) {
    addLog(`単語が${useWords.length}個のため、${useWords.length}問で生成します。`, 'system');
  }

  generateBtn.classList.add('loading');
  generateBtn.disabled = true;

  addLog('AIが英文を生成しています…', 'system');

  try {
    const prompt = `あなたは英語教師です。英検${grade}レベルの短文和訳テストを作成してください。

以下の単語リストを使って、各単語を1文に1回使った英文を作ってください。
単語リスト: ${useWords.join(', ')}

条件:
- 各英文は7〜12語
- 英検${grade}レベルに適した簡単な英文
- 各単語を必ず1回使う
- 日常的でわかりやすい文

返答はJSON形式のみで（他のテキスト不要）:
{"sentences": ["英文1", "英文2", ...]}

${useWords.length}個の英文を生成してください。`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 2000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    const sentences = parsed.sentences;

    if (!sentences || sentences.length === 0) throw new Error('英文の生成に失敗しました。');

    addLog(`${sentences.length}問の英文を生成しました ✓`, 'system');
    sentences.forEach((s, i) => addLog(`${i+1}. ${s}`, 'ai'));

    addLog('テスト用紙を作成しています…', 'system');
    const html = buildHTML(title, sentences);
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    previewFrame.src = URL.createObjectURL(blob);
    window._currentHTML = html;

    downloadArea.classList.add('visible');
    addLog('完成！プレビューを確認して印刷またはPDF保存してください ✓', 'system');

  } catch(err) {
    showError('エラーが発生しました: ' + err.message);
  } finally {
    generateBtn.classList.remove('loading');
    generateBtn.disabled = false;
  }
}

function printTest() {
  const win = previewFrame.contentWindow;
  if (win) { win.focus(); win.print(); }
}

function resetAll() {
  downloadArea.classList.remove('visible');
  chatArea.innerHTML = '';
  chatArea.classList.remove('visible');
  errorMsg.classList.remove('visible');
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.add('visible');
}
</script>
</body>
</html>
